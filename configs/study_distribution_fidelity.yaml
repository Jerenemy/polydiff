# Compare how well each architecture learns the baseline data distribution,
# then test whether late regularity guidance improves or harms that fit.
# Run with:
# python -m polydiff.studies.run --config configs/study_distribution_fidelity.yaml

study:
  name: "distribution-fidelity"
  root_dir: "data/studies"
  parallel:
    enabled: false
    max_workers: 3
    require_cuda: true
  summary:
    reference_data_path: "data/raw/hexagons.npz"
    representative_count: 12
    outlier_count: 12
    max_projection_points: 2000

cases:
  - name: "train-mlp"
    kind: "train_diffusion"
    config: "configs/train_diffusion.yaml"
    tags:
      stage: "train"
      architecture: "mlp"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
    overrides:
      data.path: "data/raw/hexagons.npz"
      model.type: "mlp"
      model.use_global_features: null

  - name: "train-gat"
    kind: "train_diffusion"
    config: "configs/train_diffusion.yaml"
    tags:
      stage: "train"
      architecture: "gat"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
    overrides:
      data.path: "data/raw/hexagons.npz"
      model.type: "gat"
      model.use_global_features: false

  - name: "train-gcn"
    kind: "train_diffusion"
    config: "configs/train_diffusion.yaml"
    tags:
      stage: "train"
      architecture: "gcn"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
    overrides:
      data.path: "data/raw/hexagons.npz"
      model.type: "gcn"
      model.use_global_features: false

  - name: "sample-mlp-unguided"
    kind: "sample_diffusion"
    config: "configs/sample_diffusion.yaml"
    tags:
      analysis_group: "architecture_baseline"
      architecture: "mlp"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
      guidance_enabled: false
      guidance_schedule: "unguided"
      guidance_scale: 0.0
      guidance_baseline: true
    overrides:
      model.run: "{{train-mlp.run_name}}"
      sampling.guidance:
        enabled: false
      sampling.restoration:
        enabled: false
      sampling.num_samples: 10000

  - name: "sample-gat-unguided"
    kind: "sample_diffusion"
    config: "configs/sample_diffusion.yaml"
    tags:
      analysis_group: "architecture_baseline"
      architecture: "gat"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
      guidance_enabled: false
      guidance_schedule: "unguided"
      guidance_scale: 0.0
      guidance_baseline: true
    overrides:
      model.run: "{{train-gat.run_name}}"
      sampling.guidance:
        enabled: false
      sampling.restoration:
        enabled: false
      sampling.num_samples: 10000

  - name: "sample-gcn-unguided"
    kind: "sample_diffusion"
    config: "configs/sample_diffusion.yaml"
    tags:
      analysis_group: "architecture_baseline"
      architecture: "gcn"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
      guidance_enabled: false
      guidance_schedule: "unguided"
      guidance_scale: 0.0
      guidance_baseline: true
    overrides:
      model.run: "{{train-gcn.run_name}}"
      sampling.guidance:
        enabled: false
      sampling.restoration:
        enabled: false
      sampling.num_samples: 10000

  - name: "sample-mlp-reg-late-2p0"
    kind: "sample_diffusion"
    config: "configs/sample_diffusion.yaml"
    tags:
      analysis_group: "distribution_guidance"
      architecture: "mlp"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
      guidance_enabled: true
      guidance_schedule: "late"
      guidance_scale: 2.0
    overrides:
      model.run: "{{train-mlp.run_name}}"
      sampling.restoration:
        enabled: false
      sampling.guidance:
        enabled: true
        components:
          - kind: "regularity"
            scale: 2.0
            schedule: "late"
      sampling.num_samples: 10000

  - name: "sample-gat-reg-late-2p0"
