# Sampling config
experiment_name: "polydiff-sample"
seed: 0
device: auto

model:
  # Optional: set a specific checkpoint path or a run name/number.
  # If both are omitted, sampling uses the most recent models/run_* folder.
  # checkpoint: "models/run_0007__polydiff-train-gat-hexagons-noisy/diffusion_final.pt"
  # run: "run_0007__polydiff-train-gat-hexagons-noisy"

sampling:
  num_samples: 10000 #64
  # Optional inference-time override (must be <= checkpoint diffusion.n_steps)
  # n_steps: 25
  # Optional polygon-size prior. If omitted, GAT/GCN checkpoints default to the
  # empirical training-set histogram stored in the checkpoint metadata.
  # For MLP checkpoints this must stay fixed at the checkpoint's n_vertices.
  # size_distribution:
  #   values: [5, 6, 7, 8]
  #   probabilities: [0.1, 0.2, 0.4, 0.3]
  # Optional explicit sample output path. By default this becomes:
  # data/processed/<run_name>/sample_0001__.../samples.npz
  # out_path: "data/processed/custom_samples.npz"
  # Optional classifier, regressor, analytic regularity, or analytic area guidance.
  # The sampler itself is architecture-agnostic:
  # it only consumes a gradient in x-space, so a future variable-size GNN
  # guidance model can plug into the same interface.
  guidance:
    enabled: true
    kind: regularity   # classifier | regressor | regularity | area
  #   checkpoint: "models/classifier_final.pt"  # required for classifier/regressor only
    scale: 10.0
  #   target_class: 1    # classifier only
  #   target_value: 0.95 # regressor, regularity, or area only; omit to maximize the objective
  #   alpha: 8.0         # regularity only
  #   beta: 5.0          # regularity only
  #   gamma: 4.0         # regularity only
  # Optional GIF export of one sample's reverse diffusion trajectory.
  # By default this becomes:
  # data/processed/<run_name>/sample_0001__.../media/animations/sample_0000.gif
  # animation:
  #   out_path: "data/processed/custom_media/animations"
  #   count: 4
  #   sample_index: 0
  #   max_frames: 120
  #   fps: 12
  # Diagnostics are enabled by default and written next to samples as
  # data/processed/<run_name>/sample_0001__.../samples.diagnostics.json. Override here if needed.
  # diagnostics:
  #   enabled: true
  #   out_path: "data/processed/custom_samples.diagnostics.json"
  #   reference_data_path: "data/raw/hexagons.npz"
