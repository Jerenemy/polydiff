# Controlled MLP guidance study for timing and strength characterization.
# The strength sweep intentionally includes very large scales to find where
# regularity guidance plateaus or starts damaging the sample distribution.
# Run with:
# python -m polydiff.studies.run --config configs/study_guidance_characterization.yaml

study:
  name: "guidance-characterization"
  root_dir: "data/studies"
  parallel:
    enabled: false
    max_workers: 3
    require_cuda: true
  summary:
    reference_data_path: "data/raw/hexagons.npz"
    representative_count: 12
    outlier_count: 12
    max_projection_points: 2000

cases:
  - name: "train-mlp"
    kind: "train_diffusion"
    config: "configs/train_diffusion.yaml"
    tags:
      stage: "train"
      architecture: "mlp"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
    overrides:
      data.path: "data/raw/hexagons.npz"
      model.type: "mlp"
      model.use_global_features: null

  - name: "sample-mlp-unguided"
    kind: "sample_diffusion"
    config: "configs/sample_diffusion.yaml"
    tags:
      architecture: "mlp"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
      guidance_enabled: false
      guidance_schedule: "unguided"
      guidance_scale: 0.0
      guidance_baseline: true
    overrides:
      model.run: "{{train-mlp.run_name}}"
      sampling.guidance:
        enabled: false
      sampling.restoration:
        enabled: false
      sampling.num_samples: 10000

  - name: "sample-mlp-reg-all"
    kind: "sample_diffusion"
    config: "configs/sample_diffusion.yaml"
    tags:
      analysis_group: "guidance_schedule"
      architecture: "mlp"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
      guidance_enabled: true
      guidance_schedule: "all"
      guidance_scale: 2.0
    overrides:
      model.run: "{{train-mlp.run_name}}"
      sampling.restoration:
        enabled: false
      sampling.guidance:
        enabled: true
        components:
          - kind: "regularity"
            scale: 2.0
            schedule: "all"
      sampling.num_samples: 10000

  - name: "sample-mlp-reg-early"
