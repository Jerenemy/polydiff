# Training config
experiment_name: "polydiff-train"
seed: 0
device: auto

data:
  path: "data/raw/mixed_polygons.npz" # hexagons_noisy.npz | mixed_polygons.npz
  batch_size: 128
  shuffle: true
  num_workers: 0

model:
  type: gat # mlp | gat | gcn
  hidden_dim: 256
  time_emb_dim: 64
  num_layers: 3
  use_global_features: false # gat | gcn only

diffusion:
  n_steps: 50
  beta_start: 0.0001
  beta_end: 0.02
  prediction_target: x0 # x0 | epsilon ; "mean" is accepted as an alias for x0

training:
  epochs: 40
  lr: 0.0002
  log_every: 50
  save_every: 2000
  save_dir: "models" # run_* folders are created under this root
  # Optional expensive diagnostic: periodically generate real samples during training
  # and compare their distribution to the training set. Leave at 0 to disable.
  sample_diagnostics_every: 0
  sample_diagnostics_num_samples: 128
  # sample_diagnostics_n_steps: 1000
  sample_diagnostics_seed: 0
