    tags:
      stage: "train"
      architecture: "gat"
      dataset_family: "hexagons"
      dataset_noise: "noisy"
      dataset_noise_rank: 2
    overrides:
      data.path: "data/raw/hexagons_noisy.npz"
      model.type: "gat"
      model.use_global_features: false

  - name: "train-gcn-noisy"
    kind: "train_diffusion"
    config: "configs/train_diffusion.yaml"
    tags:
      stage: "train"
      architecture: "gcn"
      dataset_family: "hexagons"
      dataset_noise: "noisy"
      dataset_noise_rank: 2
    overrides:
