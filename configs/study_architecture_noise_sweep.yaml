# Compare MLP, GAT, and GCN as the training polygon dataset becomes noisier.
# Generate the referenced datasets first:
# python scripts/generate_data/generate_thesis_datasets.py
# Then run:
# python -m polydiff.studies.run --config configs/study_architecture_noise_sweep.yaml

study:
  name: "architecture-noise-sweep"
  root_dir: "data/studies"
  parallel:
    enabled: false
    max_workers: 2
    require_cuda: true
  summary:
    representative_count: 12
    outlier_count: 12
    max_projection_points: 2000

cases:
  - name: "train-mlp-baseline"
    kind: "train_diffusion"
    config: "configs/train_diffusion.yaml"
    tags:
      stage: "train"
      architecture: "mlp"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
    overrides:
      data.path: "data/raw/hexagons.npz"
      model.type: "mlp"
      model.use_global_features: null

  - name: "train-gat-baseline"
    kind: "train_diffusion"
    config: "configs/train_diffusion.yaml"
    tags:
      stage: "train"
      architecture: "gat"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
    overrides:
      data.path: "data/raw/hexagons.npz"
      model.type: "gat"
      model.use_global_features: false

  - name: "train-gcn-baseline"
    kind: "train_diffusion"
    config: "configs/train_diffusion.yaml"
    tags:
      stage: "train"
      architecture: "gcn"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
    overrides:
      data.path: "data/raw/hexagons.npz"
      model.type: "gcn"
      model.use_global_features: false

  - name: "train-mlp-noisy"
    kind: "train_diffusion"
    config: "configs/train_diffusion.yaml"
    tags:
      stage: "train"
      architecture: "mlp"
      dataset_family: "hexagons"
      dataset_noise: "noisy"
      dataset_noise_rank: 2
    overrides:
      data.path: "data/raw/hexagons_noisy.npz"
      model.type: "mlp"
      model.use_global_features: null

  - name: "train-gat-noisy"
    kind: "train_diffusion"
