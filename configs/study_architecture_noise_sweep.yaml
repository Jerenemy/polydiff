  - name: "sample-mlp-baseline"
    kind: "sample_diffusion"
    config: "configs/sample_diffusion.yaml"
    tags:
      analysis_group: "architecture_noise"
      architecture: "mlp"
      dataset_family: "hexagons"
      dataset_noise: "baseline"
      dataset_noise_rank: 1
      guidance_enabled: false
      guidance_schedule: "unguided"
      guidance_scale: 0.0
    overrides:
      model.run: "{{train-mlp-baseline.run_name}}"
      sampling.guidance:
        enabled: false
      sampling.restoration:
        enabled: false
      sampling.num_samples: 10000

