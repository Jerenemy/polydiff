study:
  name: polygon-guidance-pooling
  root_dir: data/studies

cases:
  - name: polygon-gat-avg-with-t
    kind: train_guidance_model
    config: configs/train_guidance_model.yaml
    overrides:
      experiment_name: polygon-gat-avg-with-t
      data.path: data/raw/mixed_polygons.npz
      classifier.type: gat
      classifier.pooling: avg
      classifier.timestep_conditioning: true
      labels.type: score_regression
    tags:
      domain: polygon
      architecture: gat
      pooling: avg
      timestep_conditioning: true
      variable_size: true

