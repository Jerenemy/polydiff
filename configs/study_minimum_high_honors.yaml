# Example study manifest for the minimum high-honors package.
# Run with:
# python -m polydiff.studies.run --config configs/study_minimum_high_honors.yaml

study:
  name: "minimum-high-honors"
  root_dir: "data/studies"
  summary:
    reference_data_path: "data/raw/hexagons.npz"
    representative_count: 12
    outlier_count: 12
    max_projection_points: 2000

cases:
  - name: "train-mlp"
    kind: "train_diffusion"
    config: "configs/train_diffusion.yaml"
    overrides:
      data.path: "data/raw/hexagons.npz"
      model.type: "mlp"
      model.use_global_features: null

  - name: "train-gcn"
    kind: "train_diffusion"
    config: "configs/train_diffusion.yaml"
    overrides:
      data.path: "data/raw/hexagons.npz"
      model.type: "gcn"
      model.use_global_features: false

  - name: "train-gat"
    kind: "train_diffusion"
    config: "configs/train_diffusion.yaml"
    overrides:
      data.path: "data/raw/hexagons.npz"
      model.type: "gat"
      model.use_global_features: false

  - name: "sample-mlp-unguided"
    kind: "sample_diffusion"
    config: "configs/sample_diffusion.yaml"
    overrides:
      model.run: "{{train-mlp.run_name}}"
      sampling.guidance:
        enabled: false
      sampling.restoration:
        enabled: false
      sampling.num_samples: 10000

  - name: "sample-gcn-unguided"
    kind: "sample_diffusion"
    config: "configs/sample_diffusion.yaml"
    overrides:
      model.run: "{{train-gcn.run_name}}"
      sampling.guidance:
        enabled: false
      sampling.restoration:
        enabled: false
      sampling.num_samples: 10000

  - name: "sample-gat-unguided"
    kind: "sample_diffusion"
    config: "configs/sample_diffusion.yaml"
    overrides:
      model.run: "{{train-gat.run_name}}"
      sampling.guidance:
        enabled: false
      sampling.restoration:
        enabled: false
      sampling.num_samples: 10000

  - name: "sample-mlp-reg-weak"
    kind: "sample_diffusion"
    config: "configs/sample_diffusion.yaml"
    overrides:
      model.run: "{{train-mlp.run_name}}"
      sampling.restoration:
        enabled: false
      sampling.guidance:
        enabled: true
        components:
          - kind: "regularity"
            scale: 0.5
            schedule: "all"
      sampling.num_samples: 10000

  - name: "sample-mlp-reg-late"
    kind: "sample_diffusion"
    config: "configs/sample_diffusion.yaml"
    overrides:
      model.run: "{{train-mlp.run_name}}"
      sampling.restoration:
        enabled: false
      sampling.guidance:
        enabled: true
        components:
          - kind: "regularity"
            scale: 2.0
            schedule: "late"
      sampling.num_samples: 10000
