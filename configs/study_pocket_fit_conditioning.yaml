# Main thesis bridge from polydiff to the binding-affinity guidance problem.
# This study asks whether a pocket-conditioned surrogate trained on noisy x_t
# should also receive timestep t, and whether that improves the true
# reward-fidelity tradeoff during guided diffusion sampling.

study:
  name: pocket-fit-conditioning
  root_dir: data/studies

thesis:
  role: main learned-guidance design study before returning to binding-affinity experiments
  primary_question: does conditioning the pocket-fit surrogate on noisy x_t and timestep t improve true conditional reward more safely than omitting t
  upper_bound_reference: analytic pocket-fit guidance
  decision_rule: prefer surrogate-with-t only if it closes the gap to analytic guidance without worse manifold drift or invalidity

seed: 0
device: auto

data:
  ligand_data_path: data/raw/hexagons.npz
  generated_data_dir: data/pocket_conditioning/pocket-fit-conditioning
  force_regenerate: false
  ligand_size: 6
  pocket_size: 10
  num_train_pairs: 24000
  num_val_pairs: 4000
  num_test_pairs: 4000
  num_eval_pockets: 8
  pocket_radial_sigma: 0.10
  pocket_angle_sigma: 0.04
  pocket_smooth_passes: 7
  pocket_scale_min: 1.9
  pocket_scale_max: 2.5
  ligand_scale_min: 0.55
  ligand_scale_max: 1.55

reward:
  target_area_ratio: 0.22
  target_clearance: 0.10
  inside_temperature: 0.06
  outside_weight: 3.5
  area_weight: 8.0
  clearance_weight: 4.0
  sample_fractions: [0.0, 0.25, 0.5, 0.75]
  success_threshold: 0.55

diffusion:
  # Replace this with an existing checkpoint if you do not want to retrain the prior.
  # For the thesis, keeping the prior fixed while swapping guidance variants is the clean comparison.
  train_config: configs/train_diffusion.yaml
  overrides:
    experiment_name: pocket-fit-prior
    device: auto
    data.path: data/raw/hexagons.npz
    data.batch_size: 128
    model.type: mlp
    model.hidden_dim: 256
    model.time_emb_dim: 64
    model.num_layers: 3
    diffusion.n_steps: 50
    training.epochs: 30
    training.lr: 0.0002
    training.log_every: 50
    training.save_dir: models

surrogate:
  model:
    hidden_dim: 128
    num_layers: 4
    num_rbf: 16
    cutoff: 4.0
    dropout: 0.1
    time_emb_dim: 64
  noise:
    enabled: true
    n_steps: 1000
    beta_start: 0.0001
    beta_end: 0.02
  training:
    batch_size: 64
    epochs: 24
    lr: 0.0003
    weight_decay: 0.00001
    eval_repeats: 4
    log_every: 1
    save_dir: models/pocket_conditioning
    processed_dir: data/pocket_conditioning

guidance:
  # Keep schedule/scale fixed when comparing surrogate-with-t vs surrogate-no-t.
  # If you later sweep these, do it after establishing the surrogate training comparison.
  num_samples_per_pocket: 512
  n_steps: 250
  schedule: late
  scale: 8.0
  seed: 0

visualization:
  enabled: true
  pocket_index: 0
  trajectory_seed: 4242
  individual_cases:
    - unguided
    - analytic-pocket-fit
    - surrogate-with-t
  compare_cases:
    - unguided
    - surrogate-with-t
  panel_cases:
    - unguided
    - analytic-pocket-fit
    - surrogate-no-t
    - surrogate-with-t
  max_frames: 90
  fps: 12
