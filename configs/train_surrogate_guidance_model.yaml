seed: 0
device: auto
experiment_name: surrogate-guidance

data:
  # Replace these with your actual ligand-sampling records and pocket file.
  # The .pt payload can either store:
  # - explicit `ligand_atomic_numbers` plus `pred_pos`, or
  # - RDKit `mol` objects plus `pred_pos` (requires rdkit to be installed).
  pt_dir: predict_binding_affinity/example_data/records
  # pt_path: predict_binding_affinity/example_data/records.pt
  pdb_path: predict_binding_affinity/example_data/pocket.pdb
  results_key: all_results
  vina_mode: score_only
  max_affinity:
  r_ligand: 5.0
  r_cross: 6.0
  val_fraction: 0.1
  test_fraction: 0.1
  split_seed: 0

noise:
  enabled: true
  n_steps: 1000
  beta_start: 1.0e-4
  beta_end: 2.0e-2

model:
  hidden_dim: 128
  num_layers: 4
  num_rbf: 32
  cutoff: 6.0
  dropout: 0.1
  pooling: avg
  timestep_conditioning: true
  time_emb_dim: 64
  max_atomic_number: 128

training:
  batch_size: 16
  epochs: 40
  lr: 3.0e-4
  weight_decay: 1.0e-5
  huber_beta: 1.0
  log_every: 1
  eval_repeats: 4
  checkpoint_name: surrogate_best.pt
  final_checkpoint_name: surrogate_final.pt
  save_dir: models/surrogate_guidance
  processed_dir: data/surrogate_guidance
